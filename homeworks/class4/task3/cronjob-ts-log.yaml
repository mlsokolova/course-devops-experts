apiVersion: batch/v1
kind: CronJob
metadata:
  name: ts-log
  namespace: class4
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 60
  failedJobsHistoryLimit: 180
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          volumes:
          - name: local-data
            emptyDir: {} # to share the folder between main and sidecar
          - name: class4-pvc
            persistentVolumeClaim:
              claimName: class4-pvc
          containers:
          - name: check
            image: busybox:1.36
            volumeMounts:
            - name: local-data
              mountPath: /local-data
            command: ["sh", "-c", "date >> /local-data/ts.log"]
          initContainers:
          - name: ts-logshipper
            image: busybox:1.36
            # Setting restartPolicy: Always makes this a sidecar container.
            restartPolicy: Always
            command: ['sh', '-c', 'tail -F /local-data/ts.log >> /data/ts.log']
            volumeMounts:
            - name: local-data
              mountPath: /local-data
            - name: class4-pvc
              mountPath: /data

                
