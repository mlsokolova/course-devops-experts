apiVersion: v1
kind: Pod
metadata:
  labels:
    run: nginx
  name: nginx-tst-liveness
spec:
  containers:
  - image: nginx:1.31.0
    name: nginx
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
  dnsPolicy: ClusterFirst
  restartPolicy: Always
